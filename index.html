<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸运老虎机</title>
<style>
/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* === VARIABLES === */
:root {
  --bg: #1a0a2e;
  --panel: #2a1a3e;
  --gold: #ffd700;
  --gold-dark: #b8960f;
  --red: #e63946;
  --green: #2ecc71;
  --text: #f0e6ff;
  --text-dim: #9a8aaa;
  --reel-bg: #0d0d1a;
  --reel-border: #3a2a4e;
  --win-glow: rgba(255, 215, 0, 0.6);
}

/* === BACKGROUND PARTICLES === */
.bg-particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bg-particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--gold);
  border-radius: 50%;
  animation: floatUp linear infinite;
  opacity: 0;
}
@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.2; }
  100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}

/* === BASE === */
html, body { height: 100%; }
body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: radial-gradient(ellipse at center, #2a1050 0%, #1a0a2e 60%, #0a0015 100%);
  color: var(--text);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  min-height: 100vh;
  padding: 16px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  position: relative;
}

/* === LIGHT ORBS === */
.light-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
  z-index: 0;
  animation: orbPulse 4s ease-in-out infinite alternate;
}
.light-orb.orb1 { width: 200px; height: 200px; background: rgba(180, 100, 255, 0.12); top: 10%; left: 5%; animation-delay: 0s; }
.light-orb.orb2 { width: 250px; height: 250px; background: rgba(255, 180, 50, 0.08); bottom: 15%; right: 5%; animation-delay: -2s; }
.light-orb.orb3 { width: 150px; height: 150px; background: rgba(100, 200, 255, 0.1); top: 50%; left: 50%; animation-delay: -1s; transform: translate(-50%, -50%); }
@keyframes orbPulse {
  0% { transform: scale(0.8); opacity: 0.5; }
  100% { transform: scale(1.3); opacity: 1; }
}
.light-orb.orb3 { animation: orbPulseCenter 4s ease-in-out infinite alternate; }
@keyframes orbPulseCenter {
  0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
  100% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
}

/* === CONFETTI === */
.confetti-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 200;
}
.confetti-piece {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* === MAIN CONTAINER === */
.container {
  width: 100%;
  max-width: 440px;
  background: linear-gradient(180deg, var(--panel) 0%, #1a0d2e 100%);
  border: 2px solid var(--gold-dark);
  border-radius: 20px;
  padding: 20px 20px 24px;
  box-shadow: 0 0 40px rgba(255, 215, 0, 0.1), 0 20px 60px rgba(0,0,0,0.5);
  position: relative;
  z-index: 1;
}

/* === HEADER === */
.header {
  text-align: center;
  margin-bottom: 16px;
  position: relative;
}
.header h1 {
  font-size: clamp(1.4rem, 5vw, 1.8rem);
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.4), 0 0 40px rgba(255, 215, 0, 0.15);
  letter-spacing: 4px;
  animation: neonFlicker 3s ease-in-out infinite;
}
@keyframes neonFlicker {
  0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.4), 0 0 40px rgba(255, 215, 0, 0.15);
  }
  20%, 24%, 55% {
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.7), 0 0 60px rgba(255, 215, 0, 0.3), 0 0 80px rgba(255, 200, 0, 0.15);
  }
}
.header .subtitle {
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 6px;
  margin-top: 2px;
}

/* === STATUS BAR === */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 16px;
  border: 1px solid rgba(255,255,255,0.05);
}
.status-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.status-label {
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
}
.status-value {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gold);
  transition: color 0.3s;
}
.status-value.balance { color: var(--green); transition: all 0.3s; }
.status-value.balance.negative { color: var(--red); }

/* === REEL GRID === */
.reel-frame {
  background: linear-gradient(180deg, #3a2a4e 0%, #1a0a2e 100%);
  border: 3px solid var(--gold-dark);
  border-radius: 16px;
  padding: 10px;
  margin-bottom: 16px;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 0 20px rgba(255, 215, 0, 0.1);
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.5s, border-color 0.5s;
}
.reel-frame.win-glow {
  border-color: var(--gold);
  box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 0 40px rgba(255, 215, 0, 0.35), 0 0 80px rgba(255, 215, 0, 0.15);
}
.reel-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 8px;
  position: relative;
  z-index: 1;
}
.symbol-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(1.8rem, 8vw, 3rem);
  background: var(--reel-bg);
  border-radius: 10px;
  border: 2px solid var(--reel-border);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease, border-color 0.3s ease;
  position: relative;
}
.symbol-cell.spinning {
  animation: cellShake 50ms linear infinite;
}
.symbol-cell.landed {
  animation: symbolBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.symbol-cell.win {
  animation: winPulse 0.6s ease-in-out infinite;
  border-color: var(--gold);
  box-shadow: 0 0 16px var(--win-glow), inset 0 0 8px rgba(255,215,0,0.15);
  z-index: 2;
}
.symbol-cell.mega-win {
  animation: megaWinPulse 0.4s ease-in-out infinite;
  border-color: #fff;
  box-shadow: 0 0 24px rgba(255,215,0,0.8), 0 0 40px rgba(255,255,255,0.3), inset 0 0 12px rgba(255,215,0,0.3);
}

/* === BET CONTROLS === */
.bet-controls {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.bet-btn {
  flex: 1;
  min-width: 44px;
  min-height: 40px;
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: var(--text);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
  padding: 4px 2px;
}
.bet-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.2);
}
.bet-btn:active { transform: scale(0.95); }
.bet-btn.active {
  background: linear-gradient(135deg, var(--gold-dark), #d4a017);
  border-color: var(--gold);
  color: #1a0a2e;
  box-shadow: 0 0 12px rgba(255,215,0,0.25);
}
.bet-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  pointer-events: none;
}

/* === SPIN BUTTON === */
.spin-section {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
.spin-btn {
  flex: 1;
  min-height: 56px;
  background: linear-gradient(180deg, #e63946 0%, #c41e3a 100%);
  border: none;
  border-radius: 14px;
  color: #fff;
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 15px rgba(230, 57, 70, 0.4);
  position: relative;
  overflow: hidden;
}
.spin-btn::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left 0.6s;
}
.spin-btn:hover::after { left: 100%; }
.spin-btn:hover {
  background: linear-gradient(180deg, #f04050 0%, #d42a40 100%);
  box-shadow: 0 6px 20px rgba(230, 57, 70, 0.5);
}
.spin-btn:active { transform: scale(0.97); }
.spin-btn:disabled {
  background: #555;
  box-shadow: none;
  cursor: not-allowed;
  opacity: 0.5;
}
.spin-btn:disabled::after { display: none; }
.spin-btn.ready {
  animation: btnPulse 2s ease-in-out infinite;
}

/* === WIN DISPLAY === */
.win-display {
  text-align: center;
  min-height: 32px;
  font-size: 1rem;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 6px;
  transition: all 0.3s ease;
  line-height: 1.4;
}
.win-display.big-win {
  font-size: 1.3rem;
  text-shadow: 0 0 20px var(--win-glow);
  animation: winFlash 0.5s ease-in-out 3;
}
.win-display .win-detail {
  display: block;
  font-size: 0.75rem;
  font-weight: 400;
  color: var(--text-dim);
  margin-top: 2px;
}

/* === HISTORY PANEL === */
.history-section {
  margin-bottom: 8px;
}
.history-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: var(--text-dim);
  font-size: 0.75rem;
  padding: 8px 12px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.2s;
}
.history-toggle:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.history-toggle .badge {
  background: var(--gold-dark);
  color: #1a0a2e;
  border-radius: 10px;
  padding: 1px 8px;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0;
}
.history-panel {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.history-panel.open { max-height: 260px; }
.history-list {
  max-height: 220px;
  overflow-y: auto;
  margin-top: 6px;
  border-radius: 8px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.04);
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.history-list::-webkit-scrollbar { width: 4px; }
.history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.history-empty {
  text-align: center;
  color: var(--text-dim);
  font-size: 0.7rem;
  padding: 16px;
}
.history-row {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  font-size: 0.72rem;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  gap: 8px;
}
.history-row:last-child { border-bottom: none; }
.history-row .h-time {
  color: var(--text-dim);
  font-size: 0.65rem;
  min-width: 40px;
}
.history-row .h-bet {
  color: var(--text-dim);
  min-width: 40px;
  text-align: center;
}
.history-row .h-result {
  flex: 1;
  text-align: right;
  font-weight: 700;
}
.history-row .h-net { font-weight: 600; min-width: 50px; text-align: right; }
.h-win { color: var(--green); }
.h-lose { color: var(--red); }
.history-clear {
  display: block;
  margin: 4px auto 0;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 0.65rem;
  cursor: pointer;
  padding: 4px 8px;
  letter-spacing: 1px;
}
.history-clear:hover { color: var(--red); }

/* === PAYTABLE === */
.paytable-toggle {
  display: block;
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: var(--text-dim);
  font-size: 0.75rem;
  padding: 6px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 2px;
}
.paytable-toggle:hover { color: var(--text); background: rgba(255,255,255,0.06); }

.paytable {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, margin-top 0.4s ease;
}
.paytable.open {
  max-height: 200px;
  margin-top: 6px;
}
.paytable-item {
  background: rgba(0,0,0,0.3);
  border-radius: 6px;
  padding: 6px 4px;
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-dim);
  border: 1px solid rgba(255,255,255,0.04);
}
.paytable-item .symbols { font-size: 0.9rem; display: block; }
.paytable-item .mult { color: var(--gold); font-weight: 600; }

/* === GAME OVER OVERLAY === */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
}
.overlay.hidden { display: none; }
.overlay-dialog {
  background: var(--panel);
  border: 2px solid var(--gold-dark);
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  max-width: 320px;
  box-shadow: 0 0 60px rgba(255,0,0,0.2);
}
.overlay-dialog h2 {
  color: var(--red);
  font-size: 1.5rem;
  margin-bottom: 8px;
}
.overlay-dialog p {
  color: var(--text-dim);
  margin-bottom: 20px;
  font-size: 0.9rem;
}
.restart-btn {
  background: linear-gradient(180deg, var(--gold-dark), #9a7d0a);
  border: none;
  border-radius: 12px;
  color: #1a0a2e;
  font-size: 1rem;
  font-weight: 700;
  padding: 12px 32px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.2s;
}
.restart-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,215,0,0.3); }

/* === WIN COUNTER POPUP === */
.win-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 3rem;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 30px var(--win-glow), 0 0 60px rgba(255,215,0,0.4);
  z-index: 150;
  pointer-events: none;
  animation: popupBurst 1.2s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
  white-space: nowrap;
}
@keyframes popupBurst {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  30% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
  60% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -60%) scale(0.8); opacity: 0; }
}

/* === KEYFRAMES === */
@keyframes symbolBounce {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes winPulse {
  0%, 100% { box-shadow: 0 0 10px var(--win-glow), inset 0 0 6px rgba(255,215,0,0.1); }
  50% { box-shadow: 0 0 24px var(--win-glow), inset 0 0 14px rgba(255,215,0,0.25); }
}
@keyframes megaWinPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.7), 0 0 35px rgba(255,255,255,0.3); transform: scale(1); }
  50% { box-shadow: 0 0 35px rgba(255,215,0,0.9), 0 0 55px rgba(255,255,255,0.5); transform: scale(1.08); }
}
@keyframes btnPulse {
  0%, 100% { box-shadow: 0 4px 15px rgba(230, 57, 70, 0.4); }
  50% { box-shadow: 0 4px 25px rgba(230, 57, 70, 0.7), 0 0 30px rgba(255, 215, 0, 0.2); }
}
@keyframes winFlash {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.15); }
}
@keyframes cellShake {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}

/* === RESPONSIVE === */
@media (max-width: 380px) {
  .container { padding: 14px 10px 18px; border-radius: 14px; }
  .reel-grid { gap: 5px; }
  .reel-frame { padding: 6px; }
  .symbol-cell { border-radius: 6px; font-size: clamp(1.5rem, 7vw, 2.2rem); }
  .bet-btn { font-size: 0.75rem; padding: 2px 1px; min-width: 36px; }
  .paytable { grid-template-columns: repeat(2, 1fr); }
  .spin-btn { font-size: 1rem; letter-spacing: 2px; }
  .history-row { padding: 6px 8px; font-size: 0.65rem; gap: 4px; }
}
</style>
</head>
<body>

<!-- BG EFFECTS -->
<div class="bg-particles" id="bgParticles"></div>
<div class="light-orb orb1"></div>
<div class="light-orb orb2"></div>
<div class="light-orb orb3"></div>

<!-- CONFETTI CONTAINER -->
<div class="confetti-container" id="confettiContainer"></div>

<div class="container" id="app">
  <!-- HEADER -->
  <div class="header">
    <h1>🎰 幸运老虎机</h1>
    <div class="subtitle">LUCKY SLOT MACHINE</div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-item">
      <span class="status-label">💰 余额</span>
      <span class="status-value balance" id="balanceDisplay">1000</span>
    </div>
    <div class="status-item">
      <span class="status-label">🎯 投注</span>
      <span class="status-value" id="betDisplay">10</span>
    </div>
    <div class="status-item">
      <span class="status-label">📊 总胜率</span>
      <span class="status-value" id="winRateDisplay">--</span>
    </div>
  </div>

  <!-- REEL GRID -->
  <div class="reel-frame" id="reelFrame">
    <div class="reel-grid" id="reelGrid">
      <div class="symbol-cell" data-row="0" data-col="0">🍒</div>
      <div class="symbol-cell" data-row="0" data-col="1">🍋</div>
      <div class="symbol-cell" data-row="0" data-col="2">🍊</div>
      <div class="symbol-cell" data-row="1" data-col="0">🍇</div>
      <div class="symbol-cell" data-row="1" data-col="1">🔔</div>
      <div class="symbol-cell" data-row="1" data-col="2">⭐</div>
      <div class="symbol-cell" data-row="2" data-col="0">💎</div>
      <div class="symbol-cell" data-row="2" data-col="1">7️⃣</div>
      <div class="symbol-cell" data-row="2" data-col="2">🍒</div>
    </div>
  </div>

  <!-- BET CONTROLS -->
  <div class="bet-controls" id="betControls">
    <button class="bet-btn active" data-bet="10">10</button>
    <button class="bet-btn" data-bet="20">20</button>
    <button class="bet-btn" data-bet="50">50</button>
    <button class="bet-btn" data-bet="100">100</button>
    <button class="bet-btn" data-bet="200">200</button>
  </div>

  <!-- SPIN -->
  <div class="spin-section">
    <button class="spin-btn ready" id="spinBtn">🎰 开始旋转</button>
  </div>

  <!-- WIN DISPLAY -->
  <div class="win-display" id="winDisplay"></div>

  <!-- HISTORY -->
  <div class="history-section">
    <button class="history-toggle" id="historyToggle">
      📜 历史记录
      <span class="badge" id="historyCount">0</span>
    </button>
    <div class="history-panel" id="historyPanel">
      <div class="history-list" id="historyList">
        <div class="history-empty">还没有记录，快来玩吧！</div>
      </div>
      <button class="history-clear" id="historyClear">清除记录</button>
    </div>
  </div>

  <!-- PAYTABLE -->
  <button class="paytable-toggle" id="paytableToggle">📋 赔率表 ▾</button>
  <div class="paytable" id="paytable">
    <div class="paytable-item"><span class="symbols">7️⃣7️⃣7️⃣</span><span class="mult">50x</span></div>
    <div class="paytable-item"><span class="symbols">💎💎💎</span><span class="mult">30x</span></div>
    <div class="paytable-item"><span class="symbols">⭐⭐⭐</span><span class="mult">18x</span></div>
    <div class="paytable-item"><span class="symbols">🔔🔔🔔</span><span class="mult">12x</span></div>
    <div class="paytable-item"><span class="symbols">🍇🍇🍇</span><span class="mult">8x</span></div>
    <div class="paytable-item"><span class="symbols">🍊🍊🍊</span><span class="mult">5x</span></div>
    <div class="paytable-item"><span class="symbols">🍋🍋🍋</span><span class="mult">5x</span></div>
    <div class="paytable-item"><span class="symbols">🍒🍒🍒</span><span class="mult">3x</span></div>

<script>
'use strict';

// ============================================================
// CONSTANTS
// ============================================================
const SYMBOLS = [
  { id: 'cherry',   emoji: '🍒', weight: 25, payout3: 3 },
  { id: 'lemon',    emoji: '🍋', weight: 18, payout3: 5 },
  { id: 'orange',   emoji: '🍊', weight: 18, payout3: 5 },
  { id: 'grape',    emoji: '🍇', weight: 14, payout3: 8 },
  { id: 'bell',     emoji: '🔔', weight: 10, payout3: 12 },
  { id: 'star',     emoji: '⭐', weight: 7,  payout3: 18 },
  { id: 'diamond',  emoji: '💎', weight: 4,  payout3: 30 },
  { id: 'seven',    emoji: '7️⃣', weight: 2,  payout3: 50 },
];

const TOTAL_WEIGHT = SYMBOLS.reduce((s, sym) => s + sym.weight, 0);
const BET_OPTIONS = [10, 20, 50, 100, 200];
const INITIAL_BALANCE = 1000;

const PAYLINES = [
  { name: '上横线', cells: [[0,0],[0,1],[0,2]] },
  { name: '中横线', cells: [[1,0],[1,1],[1,2]] },
  { name: '下横线', cells: [[2,0],[2,1],[2,2]] },
  { name: '左斜线', cells: [[0,0],[1,1],[2,2]] },
  { name: '右斜线', cells: [[2,0],[1,1],[0,2]] },
];

// ============================================================
// AUDIO ENGINE (Web Audio API, no external files)
// ============================================================
const Audio = {
  ctx: null,
  enabled: true,

  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { this.enabled = false; }
  },

  _ensureCtx() {
    if (!this.enabled || !this.ctx) return null;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    return this.ctx;
  },

  playTick() {
    const ctx = this._ensureCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(600 + Math.random() * 400, now);
    osc.frequency.exponentialRampToValueAtTime(100, now + 0.04);
    gain.gain.setValueAtTime(0.06, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.04);
  },

  playReelStop() {
    const ctx = this._ensureCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(120, now);
    osc.frequency.exponentialRampToValueAtTime(30, now + 0.18);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.18);
  },

  playWin(multiplier) {
    const ctx = this._ensureCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    // Higher multiplier = more notes
    const noteCount = multiplier >= 30 ? 6 : multiplier >= 10 ? 4 : 3;
    const baseFreq = 523; // C5
    for (let i = 0; i < noteCount; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = i % 2 === 0 ? 'triangle' : 'sine';
      const freq = baseFreq * Math.pow(2, i / 4); // ascending
      osc.frequency.value = freq;
      const t = now + i * 0.08;
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.25);
    }
  },

  playBigWin() {
    const ctx = this._ensureCtx();
    if (!ctx) return;
    // Two rounds of fanfare
    this.playWin(50);
    const now = ctx.currentTime;
    // Bass thump
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(80, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.5);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.5);
  },

  playSpinStart() {
    const ctx = this._ensureCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    // Descending buzz
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.3);
  },

  playGameOver() {
    const ctx = this._ensureCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    [300, 250, 200, 100].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      const t = now + i * 0.15;
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.2);
    });
  },
};

// ============================================================
// PARTICLE / CONFETTI SYSTEM
// ============================================================
function spawnConfetti(count = 30) {
  const container = document.getElementById('confettiContainer');
  const colors = ['#ffd700','#ff6b6b','#51cf66','#ff922b','#74c0fc','#f06595','#e599f7','#ffd43b'];
  const frag = document.createDocumentFragment();

  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = -(Math.random() * 20) + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (5 + Math.random() * 10) + 'px';
    piece.style.height = (5 + Math.random() * 10) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    frag.appendChild(piece);
  }

  container.appendChild(frag);

  // Cleanup
  setTimeout(() => {
    while (container.firstChild) container.removeChild(container.firstChild);
  }, 3500);
}

function spawnWinPopup(amount) {
  const el = document.createElement('div');
  el.className = 'win-popup';
  el.textContent = '+¥' + amount;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

// Background particles
function initBgParticles() {
  const container = document.getElementById('bgParticles');
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'bg-particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 14) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.width = (1 + Math.random() * 2) + 'px';
    p.style.height = p.style.width;
    frag.appendChild(p);
  }
  container.appendChild(frag);
}

// ============================================================
// STATE
// ============================================================
const STATE = {
  balance: INITIAL_BALANCE,
  bet: 10,
  isSpinning: false,
  grid: [[],[],[]],
  lastWin: 0,
  winningCells: [],
  history: [],
};

// ============================================================
// DOM REFS
// ============================================================
const $ = (sel) => document.querySelector(sel);
const dom = {
  balanceDisplay: $('#balanceDisplay'),
  betDisplay: $('#betDisplay'),
  winRateDisplay: $('#winRateDisplay'),
  reelGrid: $('#reelGrid'),
  reelFrame: $('#reelFrame'),
  betControls: $('#betControls'),
  spinBtn: $('#spinBtn'),
  winDisplay: $('#winDisplay'),
  historyToggle: $('#historyToggle'),
  historyPanel: $('#historyPanel'),
  historyList: $('#historyList'),
  historyCount: $('#historyCount'),
  historyClear: $('#historyClear'),
  paytableToggle: $('#paytableToggle'),
  paytable: $('#paytable'),
  gameOverOverlay: $('#gameOverOverlay'),
  restartBtn: $('#restartBtn'),
};

// ============================================================
// localStorage
// ============================================================
function saveState() {
  try {
    localStorage.setItem('slot_machine', JSON.stringify({
      balance: STATE.balance,
      bet: STATE.bet,
      history: STATE.history.slice(-50),
    }));
  } catch(e) { /* ignore */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem('slot_machine');
    if (raw) {
      const saved = JSON.parse(raw);
      STATE.balance = Math.max(0, typeof saved.balance === 'number' ? saved.balance : INITIAL_BALANCE);
      STATE.bet = BET_OPTIONS.includes(saved.bet) ? saved.bet : 10;
      STATE.history = Array.isArray(saved.history) ? saved.history : [];
    }
  } catch(e) { /* ignore */ }
}

// ============================================================
// RANDOM
// ============================================================
function pickRandomSymbol() {
  let rand = Math.random() * TOTAL_WEIGHT;
  for (const sym of SYMBOLS) {
    rand -= sym.weight;
    if (rand <= 0) return sym;
  }
  return SYMBOLS[SYMBOLS.length - 1];
}

function generateResultGrid() {
  const grid = [[], [], []];
  for (let row = 0; row < 3; row++)
    for (let col = 0; col < 3; col++)
      grid[row][col] = pickRandomSymbol();
  return grid;
}

// ============================================================
// WIN DETECTION
// ============================================================
function checkWins(grid, bet) {
  const wins = [];
  const winningCells = [];

  for (const line of PAYLINES) {
    const symbols = line.cells.map(([r, c]) => grid[r][c]);
    const s0 = symbols[0], s1 = symbols[1], s2 = symbols[2];

    if (s0.id === s1.id && s1.id === s2.id) {
      wins.push({
        lineName: line.name,
        emoji: s0.emoji,
        multiplier: s0.payout3,
        amount: Math.floor(s0.payout3 * bet),
      });
      line.cells.forEach(([r, c]) => winningCells.push({ row: r, col: c }));
      continue;
    }

    const cherryCount = symbols.filter(s => s.id === 'cherry').length;
    if (cherryCount >= 2) {
      wins.push({
        lineName: line.name,
        emoji: '🍒',
        multiplier: 0.5,
        amount: Math.floor(0.5 * bet),
      });
      line.cells.forEach(([r, c]) => {
        if (grid[r][c].id === 'cherry') winningCells.push({ row: r, col: c });
      });
    }
  }

  const totalWin = wins.reduce((sum, w) => sum + w.amount, 0);
  return { wins, totalWin, winningCells };
}

// ============================================================
// ANIMATION CONTROLLER
// ============================================================
const ANIM = {
  SPIN_DURATIONS: [900, 1400, 1900],
  FAST_TICK: 50,
  DECEL_STEPS: [120, 200, 320, 500],
  intervals: [],
  timeouts: [],

  spin(finalGrid) {
    const allCells = Array.from(dom.reelGrid.children);
    const cols = [[], [], []];
    allCells.forEach(cell => {
      cols[parseInt(cell.dataset.col)].push({
        el: cell,
        row: parseInt(cell.dataset.row),
      });
    });

    return Promise.all(cols.map((colCells, i) => this._spinReel(colCells, finalGrid, i)));
  },

  _spinReel(colCells, finalGrid, colIdx) {
    return new Promise(resolve => {
      const fastInterval = setInterval(() => {
        colCells.forEach(({ el }) => {
          el.textContent = pickRandomSymbol().emoji;
          el.classList.add('spinning');
        });
        // Tick sound occasionally
        if (Math.random() < 0.3) Audio.playTick();
      }, this.FAST_TICK);
      this.intervals.push(fastInterval);

      const stopTimeout = setTimeout(() => {
        clearInterval(fastInterval);
        this._decelerate(colCells, finalGrid, colIdx, resolve);
      }, this.SPIN_DURATIONS[colIdx]);
      this.timeouts.push(stopTimeout);
    });
  },

  _decelerate(colCells, finalGrid, colIdx, done) {
    let step = 0;

    const tick = () => {
      if (step >= this.DECEL_STEPS.length) {
        Audio.playReelStop();
        colCells.forEach(({ el, row }) => {
          el.textContent = finalGrid[row][colIdx].emoji;
          el.classList.remove('spinning');
          el.classList.add('landed');
          setTimeout(() => el.classList.remove('landed'), 400);
        });
        done();
        return;
      }

      colCells.forEach(({ el }) => {
        el.textContent = pickRandomSymbol().emoji;
      });
      if (Math.random() < 0.4) Audio.playTick();

      step++;
      setTimeout(tick, this.DECEL_STEPS[step - 1]);
    };

    tick();
  },

  cancelAll() {
    this.intervals.forEach(clearInterval);
    this.timeouts.forEach(clearTimeout);
    this.intervals = [];
    this.timeouts = [];
  },
};

// ============================================================
// HISTORY RENDER
// ============================================================
function renderHistory() {
  const list = dom.historyList;
  dom.historyCount.textContent = STATE.history.length;

  if (STATE.history.length === 0) {
    list.innerHTML = '<div class="history-empty">还没有记录，快来玩吧！</div>';
    return;
  }

  // Show newest first
  const recent = [...STATE.history].reverse().slice(0, 50);
  const now = Date.now();

  list.innerHTML = recent.map(h => {
    const mins = Math.floor((now - h.time) / 60000);
    const timeStr = mins < 1 ? '刚刚' : mins < 60 ? mins + '分前'
      : Math.floor(mins / 60) + '时前';

    const netClass = h.net >= 0 ? 'h-win' : 'h-lose';
    const netSign = h.net >= 0 ? '+' : '';
    const resultHtml = h.win > 0
      ? `<span class="h-result h-win">🎉 +${h.win}</span>`
      : `<span class="h-result h-lose">💨</span>`;

    return `
      <div class="history-row">
        <span class="h-time">${timeStr}</span>
        <span class="h-bet">投${h.bet}</span>
        ${resultHtml}
        <span class="h-net ${netClass}">${netSign}${h.net}</span>
      </div>`;
  }).join('');

  // Auto-scroll to top (newest)
  list.scrollTop = 0;
}

function renderWinRate() {
  if (STATE.history.length === 0) {
    dom.winRateDisplay.textContent = '--';
    return;
  }
  const winCount = STATE.history.filter(h => h.win > 0).length;
  const rate = Math.round((winCount / STATE.history.length) * 100);
  dom.winRateDisplay.textContent = rate + '%';
  dom.winRateDisplay.style.color = rate >= 30 ? 'var(--green)' : 'var(--text-dim)';
}

// ============================================================
// UI RENDER
// ============================================================
function renderBalance(flash = false) {
  dom.balanceDisplay.textContent = STATE.balance;
  if (flash) {
    dom.balanceDisplay.classList.add('negative');
    dom.balanceDisplay.style.animation = 'none';
    dom.balanceDisplay.offsetHeight;
    dom.balanceDisplay.style.animation = 'winFlash 0.3s ease';
    setTimeout(() => dom.balanceDisplay.classList.remove('negative'), 300);
  }
}

function renderBet() {
  dom.betDisplay.textContent = STATE.bet;
}

function renderGrid(grid) {
  const cells = dom.reelGrid.children;
  for (let row = 0; row < 3; row++)
    for (let col = 0; col < 3; col++)
      cells[row * 3 + col].textContent = grid[row][col].emoji;
}

function clearWinningCells() {
  dom.reelGrid.querySelectorAll('.symbol-cell.win, .symbol-cell.mega-win')
    .forEach(c => { c.classList.remove('win', 'mega-win'); });
  dom.reelFrame.classList.remove('win-glow');
}

function highlightWinningCells(winningCells, maxMultiplier) {
  const cells = dom.reelGrid.children;
  const isMega = maxMultiplier >= 30;

  winningCells.forEach(({ row, col }) => {
    const cell = cells[row * 3 + col];
    cell.classList.add(isMega ? 'mega-win' : 'win');
  });

  if (winningCells.length > 0) {
    dom.reelFrame.classList.add('win-glow');
    if (isMega) {
      // Extra intense border for mega wins
      dom.reelFrame.style.boxShadow =
        'inset 0 0 30px rgba(0,0,0,0.5), 0 0 60px rgba(255, 215, 0, 0.5), 0 0 100px rgba(255, 215, 0, 0.25)';
      setTimeout(() => {
        dom.reelFrame.style.boxShadow = '';
      }, 3000);
    }
  }
}

function animateWinCount(totalWin) {
  if (totalWin <= 0) return;

  // Animate balance counting up
  const startBal = STATE.balance - totalWin;
  const endBal = STATE.balance;
  const duration = totalWin > 500 ? 800 : 400;
  const start = performance.now();

  function tick(ts) {
    const elapsed = ts - start;
    const progress = Math.min(elapsed / duration, 1);
    // Ease out cubic
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(startBal + totalWin * eased);
    dom.balanceDisplay.textContent = current;

    if (progress < 1) {
      requestAnimationFrame(tick);
    } else {
      dom.balanceDisplay.textContent = endBal;
    }
  }

  requestAnimationFrame(tick);
}

function renderWin(wins, totalWin) {
  if (totalWin === 0) {
    dom.winDisplay.innerHTML = '<span class="win-detail">再试一次吧！</span>';
    dom.winDisplay.classList.remove('big-win');
    return;
  }

  const maxMult = Math.max(...wins.map(w => w.multiplier));
  const lineNames = wins.map(w => w.lineName + '(' + w.emoji + w.multiplier + 'x)').join(' + ');
  const intensity = maxMult >= 30 ? '🔥 JACKPOT! 🔥' : maxMult >= 10 ? '✨ 大奖! ✨' : '';

  dom.winDisplay.innerHTML = `
    ${intensity ? intensity + '<br>' : ''}🎉 ${lineNames} 赢了 ¥${totalWin}
  `;
  dom.winDisplay.classList.add('big-win');
  setTimeout(() => dom.winDisplay.classList.remove('big-win'), 2000);
}

function renderAll() {
  renderBalance();
  renderBet();
  renderGrid(STATE.grid);
  renderHistory();
  renderWinRate();
}

function setSpinningState(spinning) {
  STATE.isSpinning = spinning;
  dom.spinBtn.disabled = spinning;
  dom.spinBtn.classList.toggle('ready', !spinning);
  dom.spinBtn.textContent = spinning ? '🎰 旋转中...' : '🎰 开始旋转';

  dom.betControls.querySelectorAll('.bet-btn').forEach(b => {
    b.disabled = spinning;
  });

  if (spinning) {
    clearWinningCells();
    dom.winDisplay.textContent = '';
    dom.winDisplay.classList.remove('big-win');
  }
}

function showGameOver() {
  dom.gameOverOverlay.classList.remove('hidden');
  Audio.playGameOver();
}

function hideGameOver() {
  dom.gameOverOverlay.classList.add('hidden');
}

// ============================================================
// EVENT HANDLERS
// ============================================================
async function onSpin() {
  if (STATE.isSpinning) return;
  if (STATE.balance < STATE.bet) {
    showGameOver();
    return;
  }

  // Deduct bet
  STATE.balance -= STATE.bet;
  renderBalance(true);
  saveState();

  // Lock UI
  setSpinningState(true);

  // Spin sound
  Audio.playSpinStart();

  // Generate result
  const finalGrid = generateResultGrid();
  STATE.grid = finalGrid;

  // Play animation
  await ANIM.spin(finalGrid);

  // Check wins
  const { wins, totalWin, winningCells } = checkWins(finalGrid, STATE.bet);
  const maxMultiplier = wins.length > 0 ? Math.max(...wins.map(w => w.multiplier)) : 0;

  // Award winnings
  STATE.balance += totalWin;
  STATE.lastWin = totalWin;
  STATE.winningCells = winningCells;
  STATE.history.push({
    bet: STATE.bet,
    win: totalWin,
    net: totalWin - STATE.bet,
    time: Date.now(),
  });
  if (STATE.history.length > 50) STATE.history = STATE.history.slice(-50);

  // Visual feedback
  if (totalWin > 0) {
    highlightWinningCells(winningCells, maxMultiplier);
    animateWinCount(totalWin);
    renderWin(wins, totalWin);

    // Sound
    if (maxMultiplier >= 30) {
      Audio.playBigWin();
    } else {
      Audio.playWin(maxMultiplier);
    }

    // Effects
    const confettiCount = maxMultiplier >= 30 ? 80 : maxMultiplier >= 10 ? 40 : 20;
    spawnConfetti(confettiCount);

    if (maxMultiplier >= 10) {
      spawnWinPopup(totalWin);
    }

    // Flash background on big win
    if (maxMultiplier >= 30) {
      document.body.style.transition = 'background 0.3s';
      document.body.style.background =
        'radial-gradient(ellipse at center, #3a2060 0%, #2a1050 60%, #1a0a2e 100%)';
      setTimeout(() => {
        document.body.style.background = '';
        setTimeout(() => { document.body.style.transition = ''; }, 300);
      }, 300);
    }
  } else {
    renderWin(wins, 0);
  }

  // Update UI
  renderBalance();
  renderHistory();
  renderWinRate();
  saveState();

  // Unlock
  setSpinningState(false);

  // Game over check
  if (STATE.balance < STATE.bet) {
    setTimeout(showGameOver, 2500);
  }
}

function onBetChange(betValue) {
  if (STATE.isSpinning) return;
  STATE.bet = betValue;

  dom.betControls.querySelectorAll('.bet-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.bet) === betValue);
  });

  renderBet();
  saveState();
}

function onRestart() {
  STATE.balance = INITIAL_BALANCE;
  STATE.bet = 10;
  STATE.lastWin = 0;
  STATE.winningCells = [];
  STATE.isSpinning = false;

  hideGameOver();
  clearWinningCells();
  dom.winDisplay.textContent = '';
  dom.winDisplay.classList.remove('big-win');
  dom.reelFrame.style.boxShadow = '';

  dom.betControls.querySelectorAll('.bet-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.bet) === 10);
  });

  STATE.grid = generateResultGrid();
  renderAll();
  setSpinningState(false);
  saveState();
}

// ============================================================
// INITIALIZATION
// ============================================================
function init() {
  Audio.init();
  initBgParticles();
  loadState();

  STATE.grid = generateResultGrid();
  renderAll();

  dom.betControls.querySelectorAll('.bet-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.bet) === STATE.bet);
  });

  // Spin button
  dom.spinBtn.addEventListener('click', onSpin);

  // Bet buttons
  dom.betControls.addEventListener('click', (e) => {
    const btn = e.target.closest('.bet-btn');
    if (btn && !STATE.isSpinning) {
      onBetChange(parseInt(btn.dataset.bet));
    }
  });

  // Paytable toggle
  dom.paytableToggle.addEventListener('click', () => {
    dom.paytable.classList.toggle('open');
    const isOpen = dom.paytable.classList.contains('open');
    dom.paytableToggle.textContent = isOpen ? '📋 赔率表 ▴' : '📋 赔率表 ▾';
  });

  // History toggle
  dom.historyToggle.addEventListener('click', () => {
    dom.historyPanel.classList.toggle('open');
  });

  // Clear history
  dom.historyClear.addEventListener('click', () => {
    STATE.history = [];
    renderHistory();
    renderWinRate();
    saveState();
  });

  // Restart
  dom.restartBtn.addEventListener('click', onRestart);

  // Keyboard: Space to spin
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !STATE.isSpinning) {
      e.preventDefault();
      onSpin();
    }
  });

  // bfcache
  window.addEventListener('pageshow', () => {
    loadState();
    renderAll();
    if (STATE.balance < STATE.bet) showGameOver();
  });

  if (STATE.balance < STATE.bet) {
    showGameOver();
  }

  dom.spinBtn.classList.add('ready');

  // Init audio context on first user interaction
  document.addEventListener('click', () => {
    if (Audio.ctx && Audio.ctx.state === 'suspended') {
      Audio.ctx.resume();
    }
  }, { once: true });
}

init();
</script>

</body>
</html>
