<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero's Stand — 英雄幸存者</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ============================================================
   MMO 像素风 UI — 固定在屏幕上，不随地图移动
   ============================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --panel-bg:rgba(8,8,22,0.88);--panel-border:#3d4a5c;--panel-border-light:#5a6a80;
  --text:#d0d8e8;--text-dim:#8899aa;--accent:#5b9bd5;--gold:#e0b040;
  --hp-fill-top:#ff5555;--hp-fill-bot:#991111;
  --xp-start:#2060e0;--xp-mid:#7848e0;--xp-end:#e0a020;
  --card-bg:rgba(20,24,40,0.9);--card-hover:rgba(30,40,70,0.9);
}

body{
  background:#060610;display:flex;justify-content:center;align-items:center;
  min-height:100vh;font-family:'Press Start 2P','Courier New','SimHei',monospace;
  color:var(--text);user-select:none;-webkit-user-select:none;cursor:crosshair;
  font-size:11px;letter-spacing:0.5px;
}

#game-wrapper{
  display:flex;flex-direction:column;gap:6px;width:820px;max-width:99vw;position:relative;
}

/* --- 像素面板 (固定在DOM，不随canvas移动) --- */
.pixel-panel{
  background:var(--panel-bg);
  border:3px solid var(--panel-border);
  border-top-color:var(--panel-border-light);
  border-left-color:var(--panel-border-light);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05),0 0 0 2px rgba(0,0,0,0.4),0 4px 16px rgba(0,0,0,0.5);
}

#top-bar{
  display:flex;justify-content:space-between;align-items:center;padding:8px 14px;gap:8px;flex-wrap:wrap;
}
#top-bar .title{color:var(--accent);font-size:12px;text-shadow:0 0 8px rgba(91,155,213,0.4)}
#top-bar .stat{font-size:9px}
#top-bar .stat b{color:#fff}
#top-bar .boss-alert{color:#ff6644;animation:blink 0.45s infinite;display:none;font-size:10px;text-shadow:0 0 8px rgba(255,100,60,0.6)}
#top-bar .boss-alert.active{display:inline}

@keyframes blink{50%{opacity:0.2}}

canvas{
  display:block;border:3px solid var(--panel-border);
  border-top-color:var(--panel-border-light);border-left-color:var(--panel-border-light);
  width:100%;height:auto;background:#000;
  box-shadow:0 0 30px rgba(0,0,0,0.6),inset 0 0 60px rgba(0,0,0,0.3);
}

#bottom-bar{display:flex;flex-direction:column;gap:6px;padding:10px 14px}

/* --- 进度条 (MMO风格) --- */
.bar-row{display:flex;align-items:center;gap:8px;font-size:9px}
.bar-row .label{width:26px;color:var(--text-dim);text-align:center;font-size:9px}
.bar-row .bar-track{
  flex:1;height:16px;background:#12121e;
  border:2px solid #2a2a3c;
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.6);
  position:relative;overflow:hidden;
}
.bar-row .bar-track::after{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,0,0,0.22) 39px,rgba(0,0,0,0.22) 40px);
}
.bar-row .bar-fill{height:100%;position:relative;z-index:0;transition:width 0.2s ease}
.bar-row .bar-fill.hp{
  background:linear-gradient(180deg,var(--hp-fill-top) 0%,var(--hp-fill-bot) 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.2);
}
.bar-row .bar-fill.xp{
  background:linear-gradient(90deg,var(--xp-start) 0%,var(--xp-mid) 50%,var(--xp-end) 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.2);
}
.bar-row .bar-text{
  position:absolute;inset:0;z-index:2;display:flex;align-items:center;
  justify-content:center;font-size:7px;color:#fff;text-shadow:0 0 4px #000,0 1px 2px #000;
}
.bar-row .value{width:105px;text-align:right;font-size:9px;white-space:nowrap}

#stats-row{
  display:flex;gap:12px;font-size:8px;color:var(--text-dim);
  flex-wrap:wrap;align-items:center;
}
#stats-row .val{color:#fff;}
#stats-row .gold{color:var(--gold)}

.lv-badge{
  display:flex;align-items:center;gap:4px;
  font-size:14px;color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.4);
}
.lv-badge .lv-num{font-size:20px}

/* --- 小地图 --- */
#minimap{
  position:absolute;bottom:130px;right:14px;width:120px;height:120px;
  border:2px solid var(--panel-border);background:rgba(0,0,0,0.6);
  z-index:10;border-top-color:var(--panel-border-light);border-left-color:var(--panel-border-light);
}
#minimap canvas{width:100%;height:100%;border:none;box-shadow:none}

.btn{
  padding:5px 14px;background:var(--card-bg);color:var(--text);
  border:2px solid var(--panel-border);font-family:inherit;font-size:9px;
  cursor:pointer;letter-spacing:0.5px;
  transition:background 0.12s,border-color 0.12s,transform 0.1s;
}
.btn:hover{background:var(--card-hover);border-color:var(--accent);transform:translateY(-1px)}
.btn.accent{border-color:var(--accent);color:var(--accent)}
.btn.accent:hover{background:rgba(30,60,100,0.7)}

.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);
  z-index:100;justify-content:center;align-items:center;
}
.modal-overlay.active{display:flex}

.modal-box{
  background:var(--panel-bg);border:3px solid var(--panel-border);
  border-top-color:var(--panel-border-light);border-left-color:var(--panel-border-light);
  padding:24px 28px;text-align:center;min-width:360px;max-width:92vw;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.04),0 8px 40px rgba(0,0,0,0.7);
  animation:modalIn 0.2s ease;
}
@keyframes modalIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-box h2{font-size:14px;margin-bottom:6px;letter-spacing:1px}
.modal-box p{color:var(--text-dim);font-size:9px;margin-bottom:12px;line-height:2}

#upgrade-cards{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.upgrade-card{
  width:130px;padding:14px 10px;background:var(--card-bg);
  border:2px solid var(--panel-border);cursor:pointer;transition:all 0.12s;
}
.upgrade-card:hover{
  background:var(--card-hover);border-color:var(--accent);
  transform:translateY(-4px);box-shadow:0 6px 20px rgba(91,155,213,0.2);
}
.upgrade-card .uc-icon{font-size:22px;margin-bottom:6px}
.upgrade-card .uc-name{font-size:10px;font-weight:bold;margin-bottom:3px}
.upgrade-card .uc-value{font-size:11px;color:#4ecb71;font-weight:bold}
.upgrade-card .uc-desc{font-size:7px;color:var(--text-dim);margin-top:3px;line-height:1.5}

#gameover-stats{text-align:left;margin:10px 0;font-size:9px;line-height:2.4}
#gameover-stats span{color:var(--accent)}
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="top-bar" class="pixel-panel">
    <span class="title">⚔ HERO'S STAND</span>
    <span class="stat">WAVE <b id="hud-wave">1</b></span>
    <span class="stat">KILLS <b id="hud-kills">0</b></span>
    <span class="lv-badge">Lv.<span class="lv-num" id="hud-lv-top">1</span></span>
    <span class="boss-alert" id="boss-alert">⚠ BOSS ⚠</span>
  </div>
  <canvas id="game-canvas" width="800" height="600"></canvas>
  <canvas id="minimap" width="120" height="120"></canvas>
  <div id="bottom-bar" class="pixel-panel">
    <div class="bar-row">
      <span class="label">HP</span>
      <div class="bar-track">
        <div class="bar-fill hp" id="hp-fill" style="width:100%"></div>
        <div class="bar-text" id="hp-text">100 / 100</div>
      </div>
      <span class="value">ATK <b id="hud-atk">13</b></span>
    </div>
    <div class="bar-row">
      <span class="label">EXP</span>
      <div class="bar-track">
        <div class="bar-fill xp" id="xp-fill" style="width:0%"></div>
        <div class="bar-text" id="xp-text">0 / 50</div>
      </div>
      <span class="value" style="color:#ffd700">Lv.<b id="hud-lv">1</b></span>
    </div>
    <div id="stats-row">
      <span>💰 <span class="gold" id="hud-gold">0</span>G</span>
      <span>SPD <span class="val" id="hud-spd">260</span></span>
      <span>CD <span class="val" id="hud-cd">0.70</span>s</span>
      <span id="hud-regen-disp" style="display:none">REGEN <span class="val" id="hud-regen">0</span>/s</span>
      <span style="margin-left:auto;display:flex;gap:6px">
        <button class="btn" id="btn-mute" onclick="toggleMute()" title="静音">🔊</button>
        <button class="btn" id="btn-pause" onclick="togglePause()">⏸ PAUSE</button>
      </span>
    </div>
  </div>
</div>

<div class="modal-overlay active" id="modal-start">
  <div class="modal-box">
    <h2 style="color:var(--accent)">⚔ HERO'S STAND</h2>
    <p>英雄幸存者 — 2000x2000 大世界</p>
    <p style="font-size:8px;line-height:2.2">
      🎮 WASD / 方向键 移动<br>
      🎯 自动攻击最近敌人<br>
      📈 击杀 → 经验 → 升级 → 强化<br>
      👾 每 5 波 BOSS 来袭！<br>
      🔊 建议开启声音游玩
    </p>
    <button class="btn accent" onclick="startGame()" style="margin-top:8px;font-size:13px;padding:10px 36px">
      ⚡ START
    </button>
  </div>
</div>

<div class="modal-overlay" id="modal-upgrade">
  <div class="modal-box">
    <h2 style="color:#4ecb71">⬆ LEVEL UP!</h2>
    <p>选择一项强化 (点击卡片)</p>
    <div id="upgrade-cards"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-gameover">
  <div class="modal-box">
    <h2 style="color:var(--hp-fill-top)">💀 GAME OVER</h2>
    <div id="gameover-stats"></div>
    <button class="btn accent" onclick="restartGame()" style="font-size:13px;padding:10px 36px">
      🔄 RETRY
    </button>
  </div>
</div>

<script>
/* ============================================================
   数据层 — 2000x2000 大世界
   ============================================================ */
const CONFIG = {
  WORLD_W: 2000, WORLD_H: 2000,
  VIEW_W: 800, VIEW_H: 600,

  PLAYER: {
    hp:100,maxHp:100,atk:10,speed:260,
    atkSpd:650,radius:13,invincibleMs:300,
    hpRegen:0,pickupRange:55,
    level:1,xp:0,xpToNext:50,gold:0,
  },

  ENEMY_TYPES: {
    normal:{ name:'史莱姆', hp:35,atk:8, speed:140,radius:13,xp:12,gold:2,color:'#e74c3c',colorLight:'#ff6b6b' },
    fast:  { name:'蝙蝠',   hp:20,atk:5, speed:140,radius:11,xp:18,gold:3,color:'#f39c12',colorLight:'#f7dc6f' },
    tank:  { name:'石魔像', hp:90,atk:16,speed:80, radius:19,xp:30,gold:5,color:'#8e44ad',colorLight:'#bb8fce' },
  },
  ENEMY_SPAWN_RATIO: [50, 25, 25],

  BOSS: {
    hpBase:600, hpPerWave:250, atkBase:28, atkPerWave:6,
    speed:100, radius:36, xpBase:250, goldBase:60,
    color:'#c0392b', glowColor:'#ff4444',
  },
  BOSS_EVERY: 5,

  WAVE: { baseEnemies:5, enemiesPerWave:3, statMultPerWave:0.10 },

  PROJECTILE: { speed:550, radius:4, color:'#f1c40f', trailColor:'#f39c12' },

  DROP: { goldChance:0.45, magnetSpeed:350, radius:5, lifetime:9000 },

  xpToLevel: (lv) => lv * 50 + 50,

  UPGRADE_POOL: [
    { id:'atk',     name:'攻击力',   icon:'⚔️', min:8,  max:18, unit:'',   desc:'提升每次攻击伤害' },
    { id:'maxHp',   name:'最大生命', icon:'❤️', min:30, max:60, unit:'',   desc:'提升生命上限\n并回复等量HP' },
    { id:'speed',   name:'移动速度', icon:'👟', min:25, max:55, unit:'',   desc:'移动更快\n躲避更灵活' },
    { id:'atkSpd',  name:'攻击速度', icon:'⚡', min:100,max:200,unit:'ms', desc:'减少攻击间隔\n(最低150ms)' },
    { id:'hpRegen', name:'生命回复', icon:'💚', min:1.0,max:2.5,unit:'/s', desc:'每秒自动回复生命' },
  ],

  PARTICLE_COUNT: 10,
};

const STATE = {
  screen:'start',paused:false,muted:false,
  player:{...CONFIG.PLAYER},
  enemies:[],projectiles:[],drops:[],particles:[],floatTexts:[],
  wave:{ number:1,totalEnemies:5,spawned:0,killed:0,bossActive:false,
         spawnQueue:[],spawnTimer:0,spawnInterval:350,
         waveDelay:1500,waveDelayTimer:0,transitioning:false },
  stats:{ kills:0,bossKills:0,totalGold:0 },
  keys:{},mouse:{x:0,y:0},
  upgradeChoices:[],pendingUpgrades:0,
  attackCooldown:0,invincibleTimer:0,
  screenShake:{intensity:0,duration:0},bossFlash:0,
  environment:[],comboCount:0,comboTimer:0,
  bgImage:null,bgLoaded:false,bgImgW:800,bgImgH:600,
  bgTile:null,
  camera:{x:0,y:0},
};

const $=id=>document.getElementById(id);
const DOM={
  canvas:$('game-canvas'),minimap:$('minimap'),
  hudWave:$('hud-wave'),hudKills:$('hud-kills'),
  hudGold:$('hud-gold'),hudLv:$('hud-lv'),hudAtk:$('hud-atk'),
  hudSpd:$('hud-spd'),hudCd:$('hud-cd'),hpFill:$('hp-fill'),
  hpText:$('hp-text'),xpFill:$('xp-fill'),xpText:$('xp-text'),
  bossAlert:$('boss-alert'),btnPause:$('btn-pause'),btnMute:$('btn-mute'),
  modalStart:$('modal-start'),modalUpgrade:$('modal-upgrade'),
  modalGameover:$('modal-gameover'),upgradeCards:$('upgrade-cards'),
  gameoverStats:$('gameover-stats'),hudRegen:$('hud-regen'),
  hudRegenDisp:$('hud-regen-disp'),hudLvTop:$('hud-lv-top'),
};
const ctx=DOM.canvas.getContext('2d');
const mctx=DOM.minimap.getContext('2d');


/* ============================================================
   背景图 & 瓦片
   ============================================================ */
function initBackground(){
  STATE.bgImage=new Image();
  STATE.bgImage.onload=()=>{
    STATE.bgLoaded=true;
    STATE.bgImgW=STATE.bgImage.naturalWidth||800;
    STATE.bgImgH=STATE.bgImage.naturalHeight||600;
  };
  STATE.bgImage.onerror=()=>{STATE.bgLoaded=false};
  STATE.bgImage.src='https://aka.doubaocdn.com/s/V0YV1wPMJb';

  // 创建400x300草原瓦片 (fallback)
  const t=document.createElement('canvas');t.width=400;t.height=300;
  const tc=t.getContext('2d');
  const sky=tc.createLinearGradient(0,0,0,135);
  sky.addColorStop(0,'#4a7ab5');sky.addColorStop(0.5,'#6b9ecf');sky.addColorStop(1,'#87bce8');
  tc.fillStyle=sky;tc.fillRect(0,0,400,150);
  tc.fillStyle='#fffef5';tc.beginPath();tc.arc(300,50,22,0,Math.PI*2);tc.fill();
  tc.fillStyle='#6b7b8d';
  tc.beginPath();tc.moveTo(0,130);tc.lineTo(50,100);tc.lineTo(100,120);tc.lineTo(160,85);tc.lineTo(220,115);tc.lineTo(280,95);tc.lineTo(340,110);tc.lineTo(400,100);tc.lineTo(400,130);tc.closePath();tc.fill();
  tc.fillStyle='#4a5a3a';
  tc.beginPath();tc.moveTo(0,150);tc.quadraticCurveTo(100,130,200,140);tc.quadraticCurveTo(300,125,400,138);tc.lineTo(400,160);tc.lineTo(0,160);tc.closePath();tc.fill();
  tc.fillStyle='#1e3d0e';
  for(let x=-5;x<410;x+=20){tc.beginPath();tc.moveTo(x,155);tc.lineTo(x+10,140);tc.lineTo(x+20,155);tc.closePath();tc.fill()}
  tc.fillStyle='#2d5016';
  for(let x=5;x<410;x+=16){tc.beginPath();tc.moveTo(x,158);tc.lineTo(x+8,148);tc.lineTo(x+16,158);tc.closePath();tc.fill()}
  const gr=tc.createLinearGradient(0,155,0,300);
  gr.addColorStop(0,'#5a8c3f');gr.addColorStop(0.5,'#4a7a2f');gr.addColorStop(1,'#3d6a2a');
  tc.fillStyle=gr;tc.fillRect(0,155,400,145);
  tc.fillStyle='#8b7355';
  tc.beginPath();tc.moveTo(0,255);tc.quadraticCurveTo(100,240,200,250);tc.quadraticCurveTo(300,260,400,245);tc.lineTo(400,235);tc.quadraticCurveTo(300,248,200,240);tc.quadraticCurveTo(100,230,0,243);tc.closePath();tc.fill();
  STATE.bgTile=t;
}


/* ============================================================
   音频系统
   ============================================================ */
let audioCtx=null,masterGain=null;
const musicTracks=[];

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();masterGain.gain.value=0.3;
  masterGain.connect(audioCtx.destination);
}
function playTone(freq,dur,type,vol,glideTo,glideStart){
  if(!audioCtx||STATE.muted)return;
  const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'square';
  if(glideTo!==undefined){o.frequency.setValueAtTime(glideStart||freq,t);o.frequency.linearRampToValueAtTime(glideTo,t+dur)}
  else o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(Math.min(vol,0.3),t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur);
}
function playNoise(dur,vol){
  if(!audioCtx||STATE.muted)return;
  const t=audioCtx.currentTime;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const s=audioCtx.createBufferSource();s.buffer=buf;
  const g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
  f.type='bandpass';f.frequency.value=800;f.Q.value=0.5;
  g.gain.setValueAtTime(Math.min(vol,0.15),t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  s.connect(f);f.connect(g);g.connect(masterGain);s.start(t);
}

function sfxAttack(){playTone(1000,0.06,'square',0.035)}
function sfxHit(){playTone(200,0.07,'sawtooth',0.04,70)}
function sfxDeath(){playNoise(0.1,0.05);playTone(130,0.13,'sawtooth',0.04,40)}
function sfxBossDeath(){playNoise(0.25,0.1);playTone(50,0.5,'sawtooth',0.08,25)}
function sfxLevelUp(){playTone(523,0.08,'square',0.06);setTimeout(()=>playTone(659,0.08,'square',0.06),80);setTimeout(()=>playTone(784,0.15,'square',0.07),160)}
function sfxBossSpawn(){playTone(50,0.7,'sawtooth',0.12,100)}
function sfxGold(){playTone(1500,0.04,'square',0.025);setTimeout(()=>playTone(1800,0.04,'square',0.025),50)}
function sfxHurt(){playTone(120,0.15,'sawtooth',0.07,50)}
function sfxWaveStart(){playTone(330,0.12,'triangle',0.04);setTimeout(()=>playTone(440,0.12,'triangle',0.04),120)}

function startMusic(){
  if(!audioCtx||musicTracks.length>0)return;
  const bn=[130,146,164,174,146,130,123,146],mn=[523,587,659,698,784,698,659,587,523,659,784,1047,784,659,587,523];
  let bi=0,mi=0;
  musicTracks.push(setInterval(()=>{if(!STATE.paused&&STATE.screen==='playing')playTone(bn[bi%bn.length],0.25,'triangle',0.025);bi++},420));
  musicTracks.push(setInterval(()=>{if(!STATE.paused&&STATE.screen==='playing')playTone(mn[mi%mn.length],0.12,'square',0.012);mi++},210));
}
function stopMusic(){musicTracks.forEach(clearInterval);musicTracks.length=0}
function toggleMute(){STATE.muted=!STATE.muted;DOM.btnMute.textContent=STATE.muted?'🔇':'🔊'}


/* ============================================================
   工具函数
   ============================================================ */
const rand=(a,b)=>Math.random()*(b-a)+a;
const randInt=(a,b)=>Math.floor(rand(a,b+1));
const dist=(x1,y1,x2,y2)=>Math.hypot(x2-x1,y2-y1);
const clamp=(v,l,h)=>Math.max(l,Math.min(h,v));
const rpick=a=>a[Math.floor(Math.random()*a.length)];

function effectiveAtk(){const p=STATE.player;return p.atk+p.level*3}

function getCamera(){
  const p=STATE.player,VW=CONFIG.VIEW_W,VH=CONFIG.VIEW_H,WW=CONFIG.WORLD_W,WH=CONFIG.WORLD_H;
  return{
    x:clamp(p.x-VW/2,0,WW-VW),
    y:clamp(p.y-VH/2,0,WH-VH)
  };
}

function generateEnvironment(){
  STATE.environment=[];
  const WW=CONFIG.WORLD_W,WH=CONFIG.WORLD_H;
  for(let i=0;i<200;i++){
    STATE.environment.push({
      x:rand(0,WW),y:rand(0,WH),
      type:rpick(['stone','grass','flower','bush','rock','mushroom']),
      size:rand(3,10),variant:randInt(0,3),sway:rand(0,Math.PI*2),
    });
  }
}

function triggerShake(intensity,duration){
  STATE.screenShake.intensity=Math.max(STATE.screenShake.intensity,intensity);
  STATE.screenShake.duration=Math.max(STATE.screenShake.duration,duration);
}


/* ============================================================
   输入系统
   ============================================================ */
function initInput(){
  window.addEventListener('keydown',e=>{
    STATE.keys[e.key]=true;STATE.keys[e.code]=true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
    if(e.code==='Space'&&STATE.screen==='playing'){e.preventDefault();togglePause()}
  });
  window.addEventListener('keyup',e=>{STATE.keys[e.key]=false;STATE.keys[e.code]=false});
  DOM.canvas.addEventListener('mousemove',e=>{
    const r=DOM.canvas.getBoundingClientRect();
    STATE.mouse.x=(e.clientX-r.left)*(CONFIG.VIEW_W/r.width);
    STATE.mouse.y=(e.clientY-r.top)*(CONFIG.VIEW_H/r.height);
  });
  document.addEventListener('click',initAudio,{once:true});
  document.addEventListener('keydown',initAudio,{once:true});
}
function getInputDir(){
  const k=STATE.keys;let dx=0,dy=0;
  if(k['ArrowLeft']||k['KeyA']||k['a'])dx-=1;
  if(k['ArrowRight']||k['KeyD']||k['d'])dx+=1;
  if(k['ArrowUp']||k['KeyW']||k['w'])dy-=1;
  if(k['ArrowDown']||k['KeyS']||k['s'])dy+=1;
  if(dx!==0&&dy!==0){dx*=0.707;dy*=0.707}
  return{dx,dy};
}


/* ============================================================
   刷怪系统 — 在视野边缘出生
   ============================================================ */
let _eid=0;
function pickEnemyType(){
  const r=CONFIG.ENEMY_SPAWN_RATIO,t=r[0]+r[1]+r[2];let v=Math.random()*t;
  const keys=Object.keys(CONFIG.ENEMY_TYPES);
  for(let i=0;i<keys.length;i++){v-=r[i];if(v<=0)return keys[i]}
  return keys[0];
}
function edgePos(){
  const cam=getCamera(),VW=CONFIG.VIEW_W,VH=CONFIG.VIEW_H;
  const margin=40;
  switch(randInt(0,3)){
    case 0:return{x:rand(cam.x-margin,cam.x+VW+margin),y:cam.y-margin};
    case 1:return{x:rand(cam.x-margin,cam.x+VW+margin),y:cam.y+VH+margin};
    case 2:return{x:cam.x-margin,y:rand(cam.y-margin,cam.y+VH+margin)};
    default:return{x:cam.x+VW+margin,y:rand(cam.y-margin,cam.y+VH+margin)};
  }
}
function createEnemy(type,pos){
  const t=CONFIG.ENEMY_TYPES[type];
  const m=1+(STATE.wave.number-1)*CONFIG.WAVE.statMultPerWave;
  return{
    id:++_eid,x:pos.x,y:pos.y,
    hp:Math.floor(t.hp*m),maxHp:Math.floor(t.hp*m),
    atk:Math.floor(t.atk*m),
    speed:t.speed*(1+(STATE.wave.number-1)*0.04),
    radius:t.radius,type,color:t.color,colorLight:t.colorLight,
    xpValue:Math.floor(t.xp*(1+(STATE.wave.number-1)*0.1)),
    goldValue:t.gold,lastDmgTime:0,flashTimer:0,
  };
}
function createBoss(){
  const w=STATE.wave.number,c=CONFIG.BOSS;
  return{
    id:++_eid,x:edgePos().x,y:edgePos().y,
    hp:c.hpBase+w*c.hpPerWave,maxHp:c.hpBase+w*c.hpPerWave,
    atk:c.atkBase+w*c.atkPerWave,speed:c.speed,radius:c.radius,
    type:'boss',color:c.color,glowColor:c.glowColor,
    xpValue:c.xpBase+w*60,goldValue:c.goldBase+w*25,
    lastDmgTime:0,flashTimer:0,
  };
}
function initWave(n){
  const w=STATE.wave;w.number=n;w.killed=0;w.spawned=0;
  w.bossActive=false;w.transitioning=false;
  const cnt=CONFIG.WAVE.baseEnemies+(n-1)*CONFIG.WAVE.enemiesPerWave;
  w.totalEnemies=cnt+(n%CONFIG.BOSS_EVERY===0?1:0);w.spawnQueue=[];
  for(let i=0;i<cnt;i++)w.spawnQueue.push(pickEnemyType());
  if(n%CONFIG.BOSS_EVERY===0)w.spawnQueue.push('boss');
}
function updateSpawning(dt){
  const w=STATE.wave;
  if(w.transitioning){w.waveDelayTimer-=dt;if(w.waveDelayTimer<=0){w.transitioning=false;initWave(w.number);sfxWaveStart()}return}
  if(w.spawned>=w.spawnQueue.length&&STATE.enemies.length===0){w.number++;w.transitioning=true;w.waveDelayTimer=w.waveDelay;if(w.number%5===0)generateEnvironment();return}
  if(w.spawned<w.spawnQueue.length){w.spawnTimer+=dt;while(w.spawnTimer>=w.spawnInterval&&w.spawned<w.spawnQueue.length){w.spawnTimer-=w.spawnInterval;const type=w.spawnQueue[w.spawned];if(type==='boss'){const boss=createBoss();STATE.enemies.push(boss);w.bossActive=true;triggerShake(10,500);STATE.bossFlash=350;sfxBossSpawn()}else STATE.enemies.push(createEnemy(type,edgePos()));w.spawned++}}
}


/* ============================================================
   弹幕系统
   ============================================================ */
function shootProjectile(target){
  const p=STATE.player,a=Math.atan2(target.y-p.y,target.x-p.x);
  STATE.projectiles.push({
    x:p.x,y:p.y,vx:Math.cos(a)*CONFIG.PROJECTILE.speed,vy:Math.sin(a)*CONFIG.PROJECTILE.speed,
    damage:effectiveAtk(),radius:CONFIG.PROJECTILE.radius+Math.floor(effectiveAtk()/15),life:1400,trail:[],
  });
  sfxAttack();
}
function updateProjectiles(dt){
  const WW=CONFIG.WORLD_W,WH=CONFIG.WORLD_H,ds=dt/1000;
  for(let i=STATE.projectiles.length-1;i>=0;i--){
    const pj=STATE.projectiles[i];
    pj.trail.push({x:pj.x,y:pj.y,life:80});pj.x+=pj.vx*ds;pj.y+=pj.vy*ds;pj.life-=dt;
    for(let t=pj.trail.length-1;t>=0;t--){pj.trail[t].life-=dt;if(pj.trail[t].life<=0)pj.trail.splice(t,1)}
    if(pj.x<-40||pj.x>WW+40||pj.y<-40||pj.y>WH+40||pj.life<=0)STATE.projectiles.splice(i,1);
  }
}


/* ============================================================
   战斗系统
   ============================================================ */
function updateCombat(dt){
  const p=STATE.player,now=performance.now();
  for(let i=STATE.projectiles.length-1;i>=0;i--){
    const pr=STATE.projectiles[i];let hit=false;
    for(let j=STATE.enemies.length-1;j>=0;j--){
      const e=STATE.enemies[j];
      if(dist(pr.x,pr.y,e.x,e.y)<pr.radius+e.radius){dealDamage(e,pr.damage);spawnFloatText(e.x,e.y-e.radius,String(pr.damage),'#ffffff');spawnHitSpark(e.x,e.y);sfxHit();hit=true;break}
    }
    if(hit)STATE.projectiles.splice(i,1);
  }
  for(const e of STATE.enemies){
    if(dist(p.x,p.y,e.x,e.y)<p.radius+e.radius){
      if(now-e.lastDmgTime>500&&STATE.invincibleTimer<=0){
        p.hp-=e.atk;e.lastDmgTime=now;STATE.invincibleTimer=p.invincibleMs;
        spawnFloatText(p.x,p.y-p.radius,String(e.atk),'#f85149');triggerShake(4,150);sfxHurt();
        if(p.hp<=0){p.hp=0;gameOver();return}
      }
    }
  }
  if(STATE.invincibleTimer>0)STATE.invincibleTimer-=dt;
}
function dealDamage(enemy,dmg){enemy.hp-=dmg;enemy.flashTimer=60;if(enemy.hp<=0)killEnemy(enemy)}
function killEnemy(enemy){
  const idx=STATE.enemies.indexOf(enemy);if(idx!==-1)STATE.enemies.splice(idx,1);
  STATE.stats.kills++;STATE.wave.killed++;
  spawnDrops(enemy);spawnParticles(enemy.x,enemy.y,enemy.color,enemy.radius);
  STATE.comboCount++;STATE.comboTimer=1500;
  if(STATE.comboCount>=10&&STATE.comboCount%10===0)spawnFloatText(enemy.x,enemy.y-20,STATE.comboCount+' COMBO!','#ffd700');
  if(enemy.type==='boss'){
    STATE.stats.bossKills++;STATE.wave.bossActive=false;
    spawnFloatText(enemy.x,enemy.y-24,'BOSS DOWN!','#f0883e');sfxBossDeath();triggerShake(14,600);
    for(let i=0;i<15;i++)STATE.drops.push({x:enemy.x+rand(-50,50),y:enemy.y+rand(-50,50),type:'gold',value:randInt(8,25),radius:CONFIG.DROP.radius+2,life:CONFIG.DROP.lifetime+5000});
    spawnParticles(enemy.x,enemy.y,'#ff4444',enemy.radius*2);spawnParticles(enemy.x,enemy.y,'#ffd700',enemy.radius);
  }else{sfxDeath()}
  STATE.player.xp+=enemy.xpValue;checkLevelUp();
}


/* ============================================================
   掉落系统
   ============================================================ */
function spawnDrops(enemy){
  const c=CONFIG.DROP;
  STATE.drops.push({x:enemy.x+rand(-8,8),y:enemy.y+rand(-8,8),type:'xp',value:enemy.xpValue,radius:c.radius,life:c.lifetime});
  if(Math.random()<c.goldChance)STATE.drops.push({x:enemy.x+rand(-8,8),y:enemy.y+rand(-8,8),type:'gold',value:randInt(1,6)*enemy.goldValue,radius:c.radius+1,life:c.lifetime});
}
function updateDrops(dt){
  const p=STATE.player,ds=dt/1000;
  for(let i=STATE.drops.length-1;i>=0;i--){
    const d=STATE.drops[i];d.life-=dt;
    const d2=dist(p.x,p.y,d.x,d.y),mr=p.pickupRange+50;
    if(d2<mr){const a=Math.atan2(p.y-d.y,p.x-d.x);const spd=CONFIG.DROP.magnetSpeed+(mr-d2)*12;d.x+=Math.cos(a)*spd*ds;d.y+=Math.sin(a)*spd*ds}
    if(d2<p.pickupRange){if(d.type==='gold'){STATE.player.gold+=d.value;STATE.stats.totalGold+=d.value;sfxGold()}else if(d.type==='xp'){STATE.player.xp+=d.value;checkLevelUp()}STATE.drops.splice(i,1);continue}
    if(d.life<=0)STATE.drops.splice(i,1);
  }
}


/* ============================================================
   升级系统
   ============================================================ */
function checkLevelUp(){const p=STATE.player;while(p.xp>=p.xpToNext){p.xp-=p.xpToNext;p.level++;p.xpToNext=CONFIG.xpToLevel(p.level);triggerUpgrade()}}
function triggerUpgrade(){
  if(STATE.screen==='upgrade'){STATE.pendingUpgrades++;return}
  STATE.screen='upgrade';
  const pool=[...CONFIG.UPGRADE_POOL],choices=[];
  for(let i=0;i<3&&pool.length>0;i++){const idx=randInt(0,pool.length-1);choices.push(pool[idx]);pool.splice(idx,1)}
  STATE.upgradeChoices=choices;renderUpgradeModal();sfxLevelUp();
  spawnParticles(STATE.player.x,STATE.player.y,'#ffd700',20);
}
function renderUpgradeModal(){
  DOM.upgradeCards.innerHTML=STATE.upgradeChoices.map(c=>{
    let vt=c.id==='atkSpd'?'-'+c.min+'~'+c.max+c.unit:'+'+(c.id==='speed'?c.min:c.min)+'~'+c.max+c.unit;
    return`<div class="upgrade-card" onclick="selectUpgrade('${c.id}')"><div class="uc-icon">${c.icon}</div><div class="uc-name">${c.name}</div><div class="uc-value">${vt}</div><div class="uc-desc">${c.desc.replace('\\n','<br>')}</div></div>`;
  }).join('');
  DOM.modalUpgrade.classList.add('active');
}
function selectUpgrade(uid){
  const p=STATE.player,def=CONFIG.UPGRADE_POOL.find(u=>u.id===uid);if(!def)return;
  const val=uid==='atkSpd'?randInt(def.min,def.max):parseFloat(rand(def.min,def.max).toFixed(1));
  switch(uid){
    case'atk':p.atk+=Math.floor(val);break;
    case'maxHp':{const b=Math.floor(val);p.maxHp+=b;p.hp=Math.min(p.hp+b,p.maxHp);break}
    case'speed':p.speed=parseFloat((p.speed+val).toFixed(1));break;
    case'atkSpd':p.atkSpd=Math.max(150,p.atkSpd-val);break;
    case'hpRegen':p.hpRegen=parseFloat((p.hpRegen+val).toFixed(1));break;
  }
  if(STATE.pendingUpgrades>0){STATE.pendingUpgrades--;triggerUpgrade()}
  else{DOM.modalUpgrade.classList.remove('active');STATE.screen='playing';lastTime=performance.now()}
  updateHUD();
}


/* ============================================================
   粒子/浮动文字
   ============================================================ */
function spawnParticles(x,y,color,count){
  const n=count||CONFIG.PARTICLE_COUNT;
  for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),s=rand(80,350);STATE.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(250,700),maxLife:700,color,size:rand(2,6)})}
}
function spawnHitSpark(x,y){for(let i=0;i<5;i++){const a=rand(0,Math.PI*2),s=rand(50,180);STATE.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(100,300),maxLife:300,color:'#ffffff',size:rand(1,3)})}}
function spawnFloatText(x,y,text,color){STATE.floatTexts.push({x:x+rand(-8,8),y,text,life:900,maxLife:900,color})}
function updateParticles(dt){
  const ds=dt/1000;
  for(let i=STATE.particles.length-1;i>=0;i--){const p=STATE.particles[i];p.x+=p.vx*ds;p.y+=p.vy*ds;p.life-=dt;if(p.life<=0)STATE.particles.splice(i,1)}
  for(let i=STATE.floatTexts.length-1;i>=0;i--){const t=STATE.floatTexts[i];t.y-=55*ds;t.life-=dt;if(t.life<=0)STATE.floatTexts.splice(i,1)}
}


/* ============================================================
   渲染系统 — 镜头跟随玩家
   ============================================================ */
function render(){
  const VW=CONFIG.VIEW_W,VH=CONFIG.VIEW_H;
  const cam=getCamera();
  STATE.camera=cam;
  ctx.clearRect(0,0,VW,VH);

  let sx=0,sy=0;const sh=STATE.screenShake;
  if(sh.duration>0){sx=rand(-sh.intensity,sh.intensity);sy=rand(-sh.intensity,sh.intensity)}

  // ---- 世界空间 (镜头跟随) ----
  ctx.save();
  ctx.translate(-cam.x+sx,-cam.y+sy);

  drawBackground(cam);
  drawEnvironment(cam);
  drawDrops();
  drawEnemies();
  drawProjectiles();
  drawPlayer();
  drawParticles();
  drawFloatTexts();

  // 世界边界
  const WW=CONFIG.WORLD_W,WH=CONFIG.WORLD_H;
  ctx.strokeStyle='rgba(255,50,50,0.5)';ctx.lineWidth=4;
  ctx.strokeRect(0,0,WW,WH);

  ctx.restore();

  // ---- 屏幕空间 (固定UI) ----
  if(STATE.bossFlash>0){ctx.fillStyle=`rgba(255,0,0,${STATE.bossFlash/350*0.15})`;ctx.fillRect(0,0,VW,VH)}

  // 暗角
  const v=ctx.createRadialGradient(VW/2,VH/2,VW*0.3,VW/2,VH/2,VW*0.8);
  v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle=v;ctx.fillRect(0,0,VW,VH);

  // 波次过渡
  if(STATE.wave.transitioning){ctx.fillStyle='#fff';ctx.font='bold 30px "Press Start 2P","Courier New",monospace';ctx.textAlign='center';ctx.globalAlpha=0.9;ctx.fillText('WAVE '+STATE.wave.number,VW/2,VH/2);ctx.globalAlpha=1}

  // BOSS 血条 (屏幕顶部)
  const boss=STATE.enemies.find(e=>e.type==='boss');
  if(boss){const bw=380,bh=16,bx=(VW-bw)/2,by=12;ctx.fillStyle='#111';ctx.fillRect(bx-2,by-2,bw+4,bh+4);ctx.fillStyle='#2a1010';ctx.fillRect(bx,by,bw,bh);const hpPct=boss.hp/boss.maxHp;const grad=ctx.createLinearGradient(bx,0,bx+bw*hpPct,0);grad.addColorStop(0,hpPct>0.3?'#c0392b':'#ff2222');grad.addColorStop(1,hpPct>0.3?'#e74c3c':'#ff4444');ctx.fillStyle=grad;ctx.fillRect(bx,by,bw*hpPct,bh);ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);ctx.fillStyle='#fff';ctx.font='bold 11px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillText('BOSS '+Math.ceil(boss.hp)+'/'+boss.maxHp,VW/2,by+bh-3)}

  // 小地图
  drawMinimap();
}

function drawBackground(cam){
  const VW=CONFIG.VIEW_W,VH=CONFIG.VIEW_H;
  if(STATE.bgLoaded&&STATE.bgImage){
    const iw=STATE.bgImgW||800,ih=STATE.bgImgH||600;
    const sx=Math.floor(cam.x/iw)*iw,sy=Math.floor(cam.y/ih)*ih;
    for(let tx=sx;tx<cam.x+VW+iw;tx+=iw)
      for(let ty=sy;ty<cam.y+VH+ih;ty+=ih)
        ctx.drawImage(STATE.bgImage,tx,ty,iw,ih);
  } else if(STATE.bgTile){
    const iw=400,ih=300;
    const sx=Math.floor(cam.x/iw)*iw,sy=Math.floor(cam.y/ih)*ih;
    for(let tx=sx;tx<cam.x+VW+iw;tx+=iw)
      for(let ty=sy;ty<cam.y+VH+ih;ty+=ih)
        ctx.drawImage(STATE.bgTile,tx,ty);
  } else {
    ctx.fillStyle='#3d6a2a';ctx.fillRect(cam.x,cam.y,VW,VH);
  }
}

// 只绘制视野内的环境物
function drawEnvironment(cam){
  const VW=CONFIG.VIEW_W,VH=CONFIG.VIEW_H;
  for(const prop of STATE.environment){
    if(prop.x<cam.x-20||prop.x>cam.x+VW+20||prop.y<cam.y-20||prop.y>cam.y+VH+20)continue;
    const s=prop.size,h=s/2;
    ctx.save();ctx.translate(prop.x,prop.y);
    if(prop.type==='stone'){ctx.fillStyle='#5a5a5a';ctx.fillRect(-h,-h/3,s,s*0.5);ctx.fillStyle='#6a6a6a';ctx.fillRect(-h+2,-h/3-2,s-4,s*0.3)}
    else if(prop.type==='rock'){ctx.fillStyle='#4a4a4a';ctx.beginPath();ctx.arc(0,0,s*0.6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#5a5a5a';ctx.beginPath();ctx.arc(-s*0.15,-s*0.15,s*0.35,0,Math.PI*2);ctx.fill()}
    else if(prop.type==='grass'){ctx.fillStyle='#3a7a2a';ctx.fillRect(-1,-s,2.5,s);ctx.fillRect(-4,-s*0.6,2,s*0.6);ctx.fillRect(3,-s*0.7,2,s*0.7)}
    else if(prop.type==='flower'){ctx.fillStyle='#4a6a2a';ctx.fillRect(-0.5,-s,1,s);ctx.fillStyle=['#f1c40f','#e74c3c','#9b59b6','#3498db','#ff69b4'][prop.variant];ctx.beginPath();ctx.arc(0,-s,s*0.55,0,Math.PI*2);ctx.fill()}
    else if(prop.type==='bush'){ctx.fillStyle='#1e5a1e';ctx.beginPath();ctx.arc(0,0,s*0.7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#2a6a6a';ctx.beginPath();ctx.arc(-s*0.25,-s*0.2,s*0.45,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(s*0.3,-s*0.1,s*0.4,0,Math.PI*2);ctx.fill()}
    else if(prop.type==='mushroom'){ctx.fillStyle='#ddd';ctx.fillRect(-s*0.15,-s*0.5,s*0.3,s*0.5);ctx.fillStyle=['#e74c3c','#f39c12','#9b59b6'][prop.variant];ctx.beginPath();ctx.arc(0,-s*0.55,s*0.4,0,Math.PI,true);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-s*0.1,-s*0.65,s*0.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(s*0.1,-s*0.55,s*0.08,0,Math.PI*2);ctx.fill()}
    ctx.restore();
  }
}

function drawDrops(){
  for(const d of STATE.drops){
    const alpha=Math.min(1,d.life/500);ctx.globalAlpha=alpha;
    if(d.type==='gold'){
      ctx.shadowColor='#ffd700';ctx.shadowBlur=12;ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(d.x,d.y,d.radius,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(d.x-1,d.y-1,d.radius*0.35,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    } else {
      ctx.shadowColor='#4da6ff';ctx.shadowBlur=10;ctx.fillStyle='#5badff';ctx.beginPath();ctx.arc(d.x,d.y,d.radius-1,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(d.x,d.y,d.radius*0.3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;
  }
}


/* ============================================================
   像素风角色绘制
   ============================================================ */
function drawEnemies(){for(const e of STATE.enemies)drawEnemy(e)}

function drawEnemy(e){
  ctx.save();
  const r=e.radius,flash=e.flashTimer>0;
  if(e.type==='boss'){ctx.shadowColor=e.glowColor;ctx.shadowBlur=22+Math.sin(performance.now()/160)*8}

  switch(e.type){
    case'boss':drawBoss(e,r,flash);break;
    case'fast':drawBat(e,r,flash);break;
    case'tank':drawGolem(e,r,flash);break;
    default:drawSlime(e,r,flash);break;
  }

  if(e.type!=='boss'&&e.hp<e.maxHp){const bw=r*2+4,bh=3,bx=e.x-bw/2,by=e.y-r-9;ctx.fillStyle='#1a1a1a';ctx.fillRect(bx,by,bw,bh);ctx.fillStyle='#e04040';ctx.fillRect(bx,by,bw*(e.hp/e.maxHp),bh)}
  ctx.shadowBlur=0;ctx.restore();
}

function drawSlime(e,r,flash){
  const x=e.x,y=e.y;
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(x,y+r*0.65,r*0.7,r*0.18,0,0,Math.PI*2);ctx.fill();

function drawMinimap(){

  mctx.strokeStyle='#444';mctx.lineWidth=1;mctx.strokeRect(1,1,mw-2,mh-2);
  const sx=mw/WW,sy=mh/WH;

function showModal(id){DOM.modalStart.classList.remove('active');DOM.modalUpgrade.classList.remove('active');DOM.modalGameover.classList.remove('active');if(id)document.getElementById(id).classList.add('active')}
function startGame(){resetState();STATE.screen='playing';showModal(null);generateEnvironment();initWave(STATE.wave.number);updateHUD();lastTime=performance.now();startMusic()}
function restartGame(){stopMusic();startGame()}
function togglePause(){if(STATE.screen!=='playing')return;STATE.paused=!STATE.paused;if(!STATE.paused)lastTime=performance.now();updateHUD()}
function gameOver(){STATE.screen='gameover';stopMusic();sfxBossDeath();
  const p=STATE.player;DOM.gameoverStats.innerHTML=
  `存活波次: <span>${STATE.wave.number}</span><br>击杀总数: <span>${STATE.stats.kills}</span><br>BOSS击杀: <span>${STATE.stats.bossKills}</span><br>获得金币: <span>${STATE.stats.totalGold}</span><br>角色等级: <span>${p.level}</span><br>最终ATK: <span>${effectiveAtk()}</span> &nbsp; SPD: <span>${p.speed.toFixed(0)}</span>`;
  showModal('modal-gameover')}
function resetState(){
  STATE.screen='playing';STATE.paused=false;
  STATE.player={...CONFIG.PLAYER,x:CONFIG.WORLD_W/2,y:CONFIG.WORLD_H/2};
  STATE.enemies=[];STATE.projectiles=[];STATE.drops=[];STATE.particles=[];STATE.floatTexts=[];
  STATE.wave={number:1,totalEnemies:5,spawned:0,killed:0,bossActive:false,spawnQueue:[],spawnTimer:0,spawnInterval:350,waveDelay:1500,waveDelayTimer:0,transitioning:false};
  STATE.stats={kills:0,bossKills:0,totalGold:0};STATE.attackCooldown=0;STATE.invincibleTimer=0;
  STATE.upgradeChoices=[];STATE.pendingUpgrades=0;
  STATE.screenShake={intensity:0,duration:0};STATE.bossFlash=0;STATE.comboCount=0;STATE.comboTimer=0;
}


/* ============================================================
   主循环
   ============================================================ */
let lastTime=0;
function gameLoop(ts){
  requestAnimationFrame(gameLoop);
  if(STATE.screen==='start'||STATE.screen==='gameover')return;
  if(STATE.screen==='upgrade'){render();return}
  if(STATE.paused)return;
  let dt=ts-lastTime;if(dt>50)dt=50;lastTime=ts;
  if(STATE.screen==='playing')update(dt);
  if(STATE.screenShake.duration>0)STATE.screenShake.duration-=dt;
  if(STATE.bossFlash>0)STATE.bossFlash-=dt;
  if(STATE.comboTimer>0){STATE.comboTimer-=dt;if(STATE.comboTimer<=0)STATE.comboCount=0}
  render();updateHUD();
}

function update(dt){
  const p=STATE.player,ds=dt/1000,WW=CONFIG.WORLD_W,WH=CONFIG.WORLD_H;
  const{dx,dy}=getInputDir();p.x+=dx*p.speed*ds;p.y+=dy*p.speed*ds;
  p.x=clamp(p.x,p.radius,WW-p.radius);p.y=clamp(p.y,p.radius,WH-p.radius);
  if(p.hpRegen>0&&p.hp<p.maxHp)p.hp=Math.min(p.maxHp,p.hp+p.hpRegen*ds);
  updateSpawning(dt);
  for(const e of STATE.enemies){const d=dist(e.x,e.y,p.x,p.y);if(d>0.5){e.x+=(p.x-e.x)/d*e.speed*ds;e.y+=(p.y-e.y)/d*e.speed*ds}if(e.flashTimer>0)e.flashTimer-=dt}
  STATE.attackCooldown-=dt;
  if(STATE.attackCooldown<=0&&STATE.enemies.length>0){let n=null,nd=Infinity;for(const e of STATE.enemies){const d=dist(p.x,p.y,e.x,e.y);if(d<nd){nd=d;n=e}}if(n){shootProjectile(n);STATE.attackCooldown=p.atkSpd}}
  updateProjectiles(dt);updateCombat(dt);updateDrops(dt);updateParticles(dt);
}


function init(){
  initInput();initBackground();generateEnvironment();
  STATE.player.x=CONFIG.WORLD_W/2;STATE.player.y=CONFIG.WORLD_H/2;
  updateHUD();requestAnimationFrame(gameLoop);
}
init();
</script>
